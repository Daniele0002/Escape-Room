      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #030609;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
      svg {
        width: 100%;
        height: 100%;
      }
      [data-node] {
        cursor: pointer;
      }

      /* Active rings: hidden by default, shown when node is selected */
      .active-ring {
        display: none;
      }
      [data-node].active .active-ring {
        display: block;
      }

      /* Active ring colors per node */
      [data-node="fonte"] .active-ring {
        stroke: rgba(120, 180, 255, 0.4);
      }
      [data-node="mnemosyne"] .active-ring {
        stroke: rgba(200, 168, 90, 0.4);
      }
      [data-node="gate1"] .active-ring,
      [data-node="gate2"] .active-ring {
        stroke: rgba(200, 168, 90, 0.3);
      }
      [data-node="caronte"] .active-ring {
        stroke: rgba(160, 80, 220, 0.4);
      }

      /* Gate outer/inner ring: color changes on active */
      [data-node="gate1"] .outer-ring,
      [data-node="gate2"] .outer-ring {
        stroke: rgba(140, 100, 50, 0.35);
      }
      [data-node="gate1"].active .outer-ring,
      [data-node="gate2"].active .outer-ring {
        stroke: rgba(200, 168, 90, 0.5);
      }

      [data-node="gate1"] .inner-ring,
      [data-node="gate2"] .inner-ring {
        stroke: rgba(160, 120, 60, 0.25);
      }
      [data-node="gate1"].active .inner-ring,
      [data-node="gate2"].active .inner-ring {
        stroke: rgba(200, 168, 90, 0.4);
      }

      /* Caronte outer ring */
      [data-node="caronte"] .outer-ring {
        stroke: rgba(120, 60, 180, 0.3);
      }
      [data-node="caronte"].active .outer-ring {
        stroke: rgba(160, 80, 220, 0.5);
      }

      /* Porta door frame and key */
      [data-node="porta"] .door-frame {
        stroke: rgba(160, 120, 50, 0.4);
      }
      [data-node="porta"].active .door-frame {
        stroke: rgba(200, 168, 90, 0.6);
      }
      [data-node="porta"] .key-icon {
        opacity: 0.5;
      }
      [data-node="porta"].active .key-icon {
        opacity: 1;
      }
    </style>

        },
      };

      // ── Corridors ──────────────────────────────────────────────
      const JTL = { x: 213, y: 168 },
        JTC = { x: 480, y: 168 },
        JTR = { x: 745, y: 168 };
      const JAL = { x: 213, y: 335 },
        JAR = { x: 480, y: 335 };
      const N = NODES;

      const corridorPaths = [
        `M ${N.fonte.x} ${N.fonte.y + 52} L ${JTL.x} ${JTL.y}`,
        `M ${JTL.x} ${JTL.y} L ${JTC.x} ${JTC.y}`,
        `M ${JTC.x} ${JTC.y} L ${JTR.x} ${JTR.y}`,
        `M ${JTR.x} ${JTR.y} L ${N.mnemosyne.x} ${N.mnemosyne.y + 10}`,
        `M ${JTC.x} ${JTC.y} L ${N.gate1.x} ${N.gate1.y - 68}`,
        `M ${N.gate1.x} ${N.gate1.y + 68} L ${JAR.x} ${JAR.y}`,
        `M ${JTL.x} ${JTL.y} L ${JAL.x} ${JAL.y}`,
        `M ${JAL.x} ${JAL.y} L ${N.caronte.x} ${N.caronte.y - 78}`,
        `M ${JAR.x} ${JAR.y} L ${N.gate2.x} ${N.gate2.y - 68}`,
        `M ${N.gate2.x} ${N.gate2.y + 68} L ${N.porta.x} ${N.porta.y - 44}`,
      ];

      const ns = "http://www.w3.org/2000/svg";

      function svgPath(d, stroke, width, blur) {
        const p = document.createElementNS(ns, "path");
        p.setAttribute("d", d);
        p.setAttribute("fill", "none");
        p.setAttribute("stroke", stroke);
        p.setAttribute("stroke-width", width);
        if (blur) p.style.filter = `blur(${blur}px)`;
        return p;
      }

      const corridorsEl = document.getElementById("corridors");
      corridorPaths.forEach((d) => {
        const g = document.createElementNS(ns, "g");
        g.append(
          svgPath(d, "rgba(200,168,90,.18)", 14, 5),
          svgPath(d, "rgba(200,168,90,.25)", 3),
          svgPath(d, "rgba(220,190,110,.35)", 1),
        );
        corridorsEl.appendChild(g);
      });

      // ── Acheronte ──────────────────────────────────────────────
      (function () {
        const pts = [];
        for (let i = 0; i <= 20; i++) {
          const t = i / 20;
          const px = JAL.x + t * (JAR.x - JAL.x);
          const py =
            210 + Math.sin(t * Math.PI * 5) * 5 + Math.cos(t * Math.PI * 3) * 3;
          pts.push(`${i === 0 ? "M" : "L"} ${px.toFixed(1)} ${py.toFixed(1)}`);
        }
        const d = pts.join(" ");
        const g = document.getElementById("acheronte");
        const edge = svgPath(d, "rgba(100,160,255,.6)", 2.5);
        edge.setAttribute("stroke-linecap", "round");
        g.append(
          svgPath(d, "rgba(60,120,220,.15)", 18, 8),
          svgPath(d, "rgba(30,70,160,.4)", 6),
          edge,
        );
        const txt = document.createElementNS(ns, "text");
        Object.entries({
          x: (JAL.x + JAR.x) / 2,
          y: 194,
          "text-anchor": "middle",
          fill: "rgba(120,170,255,.7)",
          "font-size": 9,
          "letter-spacing": 4,
          "font-family": "Cinzel, serif",
        }).forEach(([k, v]) => txt.setAttribute(k, v));
        txt.textContent = "ACHERONTE";
        g.appendChild(txt);
      })();

      // ── Selection & Tooltip ────────────────────────────────────
      let selected = null;
      const tooltip = document.getElementById("tooltip");
      const tooltipTitle = document.getElementById("tooltip-title");
      const tooltipDesc = document.getElementById("tooltip-desc");

      function select(id) {
        document
          .querySelectorAll("[data-node]")
          .forEach((el) => el.classList.remove("active"));
        if (id && id !== selected) {
          document.querySelector(`[data-node="${id}"]`).classList.add("active");
          selected = id;
          const n = NODES[id];
          tooltipTitle.textContent = n.label;
          tooltipDesc.textContent = n.desc;
          tooltip.setAttribute("transform", `translate(${n.x},${n.y - 90})`);
          tooltip.removeAttribute("display");
        } else {
          selected = null;
          tooltip.setAttribute("display", "none");
        }
      }

      document
        .querySelectorAll("[data-node]")
        .forEach((el) =>
          el.addEventListener("click", () => select(el.dataset.node)),
        );

      document
        .getElementById("tooltip-close")
        .addEventListener("click", (e) => {
          e.stopPropagation();
          select(null);
        });
    </script>
  </body>
</html>
