<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Fase III · Il Labirinto dell'Ade</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body {
        background: #020305;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
      svg { width:100%; height:100%; }
      [data-node] { cursor: pointer; }

      .active-ring { display: none; }
      [data-node].active .active-ring { display: block; }

      [data-node="fonte"].active    .active-ring { stroke: rgba(90,170,255,0.65); }
      [data-node="mnemosyne"].active .active-ring { stroke: rgba(235,200,70,0.65); }
      [data-node="gate1"].active    .active-ring,
      [data-node="gate2"].active    .active-ring  { stroke: rgba(220,185,80,0.55); }
      [data-node="caronte"].active  .active-ring  { stroke: rgba(185,80,255,0.60); }
      [data-node="porta"].active    .active-ring  { stroke: rgba(220,185,80,0.60); }

      [data-node="gate1"]  .outer-ring,
      [data-node="gate2"]  .outer-ring { stroke: rgba(140,100,40,0.40); }
      [data-node="gate1"].active .outer-ring,
      [data-node="gate2"].active .outer-ring { stroke: rgba(225,190,80,0.72); }

      [data-node="gate1"]  .inner-ring,
      [data-node="gate2"]  .inner-ring { stroke: rgba(160,120,50,0.28); }
      [data-node="gate1"].active .inner-ring,
      [data-node="gate2"].active .inner-ring { stroke: rgba(225,190,80,0.50); }

      [data-node="caronte"]        .outer-ring { stroke: rgba(130,55,200,0.38); }
      [data-node="caronte"].active .outer-ring { stroke: rgba(185,80,255,0.68); }

      [data-node="porta"]          .door-frame { stroke: rgba(165,125,50,0.45); }
      [data-node="porta"].active   .door-frame { stroke: rgba(225,190,80,0.78); }

      /* ── Animations ── */
      @keyframes flicker {
        0%,100% { transform:scaleX(1)    scaleY(1)    translateY(0px);  opacity:.88; }
        18%      { transform:scaleX(.82)  scaleY(1.10) translateY(-1px); opacity:1;   }
        36%      { transform:scaleX(1.10) scaleY(.90)  translateY(.5px); opacity:.80; }
        54%      { transform:scaleX(.88)  scaleY(1.06) translateY(-1px); opacity:.94; }
        72%      { transform:scaleX(1.05) scaleY(.95)  translateY(0px);  opacity:.86; }
      }
      @keyframes drift {
        0%,100% { transform:translate(0,0) scale(1);      opacity:.10; }
        40%      { transform:translate(12px,-6px) scale(1.08); opacity:.18; }
        70%      { transform:translate(-7px,4px) scale(.95);  opacity:.12; }
      }
      @keyframes drift2 {
        0%,100% { transform:translate(0,0) scale(1);       opacity:.08; }
        35%      { transform:translate(-14px,-8px) scale(1.12); opacity:.16; }
        65%      { transform:translate(8px,5px) scale(.93);    opacity:.10; }
      }
      @keyframes gpulse {
        0%,100% { opacity:.28; }
        50%      { opacity:.62; }
      }
      @keyframes caronteBreath {
        0%,100% { opacity:.22; }
        50%      { opacity:.44; }
      }
      @keyframes goldShimmer {
        0%,100% { opacity:.22; }
        50%      { opacity:.58; }
      }
      @keyframes doorGlow {
        0%,100% { opacity:.30; }
        50%      { opacity:.72; }
      }
      @keyframes porcullaRaise {
        0%,100% { opacity:.18; }
        50%      { opacity:.40; }
      }

      .fl  { animation:flicker .44s ease-in-out infinite;           transform-box:fill-box; transform-origin:bottom center; }
      .fl2 { animation:flicker .44s ease-in-out .13s infinite;      transform-box:fill-box; transform-origin:bottom center; }
      .fl3 { animation:flicker .44s ease-in-out .26s infinite;      transform-box:fill-box; transform-origin:bottom center; }
      .fog-a { animation:drift  14s ease-in-out infinite; }
      .fog-b { animation:drift2 17s ease-in-out 3s infinite; }
      .fog-c { animation:drift  21s ease-in-out 7s infinite; }
      .fog-d { animation:drift2 12s ease-in-out 5s infinite; }
      .gp  { animation:gpulse 4s ease-in-out infinite; }
      .gp2 { animation:gpulse 3s ease-in-out 1.5s infinite; }
      .gp3 { animation:gpulse 5s ease-in-out .8s infinite; }
      .ca  { animation:caronteBreath 5s ease-in-out infinite; }
      .gs  { animation:goldShimmer 3.5s ease-in-out infinite; }
      .gs2 { animation:goldShimmer 4.5s ease-in-out 1.3s infinite; }
      .dg  { animation:doorGlow 3s ease-in-out infinite; }
      .pr  { animation:porcullaRaise 4s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 960 590" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Glow filters -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="halo" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="14"/>
        </filter>
        <filter id="haloSm" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
        <filter id="torchF" x="-200%" y="-200%" width="500%" height="500%">
          <feGaussianBlur stdDeviation="8"/>
        </filter>
        <filter id="stoneF" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.70" numOctaves="4" result="n" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0" in="n" result="g"/>
          <feBlend in="SourceGraphic" in2="g" mode="overlay" result="b"/>
          <feComposite in="b" in2="SourceGraphic" operator="in"/>
        </filter>

        <!-- Background gradient -->
        <radialGradient id="bgCenter" cx="50%" cy="46%" r="62%">
          <stop offset="0%"  stop-color="rgba(10,18,48,.60)"/>
          <stop offset="65%" stop-color="rgba(4,8,20,.32)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>

        <!-- Lete water -->
        <radialGradient id="leteFill" cx="50%" cy="28%" r="68%">
          <stop offset="0%"  stop-color="rgba(145,215,255,.75)"/>
          <stop offset="38%" stop-color="rgba(80,158,245,.50)"/>
          <stop offset="100%" stop-color="rgba(28,75,195,.10)"/>
        </radialGradient>
        <!-- Lete stone basin -->
        <radialGradient id="leteStone" cx="38%" cy="28%" r="68%">
          <stop offset="0%"  stop-color="#2c3a50"/>
          <stop offset="60%" stop-color="#1c2838"/>
          <stop offset="100%" stop-color="#0e1820"/>
        </radialGradient>

        <!-- Mnemosyne water -->
        <radialGradient id="mnemoFill" cx="50%" cy="28%" r="68%">
          <stop offset="0%"  stop-color="rgba(255,235,95,.80)"/>
          <stop offset="38%" stop-color="rgba(220,185,55,.52)"/>
          <stop offset="100%" stop-color="rgba(165,125,18,.10)"/>
        </radialGradient>
        <!-- Mnemosyne shore stone -->
        <radialGradient id="mnemoShore" cx="42%" cy="32%" r="65%">
          <stop offset="0%"  stop-color="#3a2e0c"/>
          <stop offset="100%" stop-color="#1e1806"/>
        </radialGradient>

        <!-- Gate / arch stone fill -->
        <radialGradient id="gateFill" cx="46%" cy="34%" r="66%">
          <stop offset="0%"  stop-color="#3c2c0e"/>
          <stop offset="52%" stop-color="#241c02"/>
          <stop offset="100%" stop-color="#120e00"/>
        </radialGradient>
        <!-- Pillar side-shading gradient -->
        <linearGradient id="pillarLG" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"  stop-color="#0c0900"/>
          <stop offset="18%" stop-color="#2c2208"/>
          <stop offset="48%" stop-color="#3c2e0e"/>
          <stop offset="80%" stop-color="#2c2208"/>
          <stop offset="100%" stop-color="#0c0900"/>
        </linearGradient>

        <!-- Caronte -->
        <radialGradient id="caronteFill" cx="50%" cy="36%" r="65%">
          <stop offset="0%"  stop-color="rgba(88,24,155,.86)"/>
          <stop offset="52%" stop-color="rgba(48,12,90,.92)"/>
          <stop offset="100%" stop-color="rgba(16,4,34,.98)"/>
        </radialGradient>
        <!-- Styx river around Caronte -->
        <radialGradient id="styxFill" cx="50%" cy="50%" r="55%">
          <stop offset="0%"  stop-color="rgba(60,30,120,.0)"/>
          <stop offset="70%" stop-color="rgba(40,15,80,.35)"/>
          <stop offset="100%" stop-color="rgba(20,5,45,.55)"/>
        </radialGradient>

        <!-- Porta door wood -->
        <linearGradient id="doorL" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"  stop-color="#180e04"/>
          <stop offset="22%" stop-color="#2a1a08"/>
          <stop offset="52%" stop-color="#1e1406"/>
          <stop offset="100%" stop-color="#0e0804"/>
        </linearGradient>
        <linearGradient id="doorR" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"  stop-color="#0e0804"/>
          <stop offset="48%" stop-color="#1e1406"/>
          <stop offset="78%" stop-color="#2a1a08"/>
          <stop offset="100%" stop-color="#180e04"/>
        </linearGradient>

        <!-- Stone floor tile pattern -->
        <pattern id="stoneFloor" width="48" height="32" patternUnits="userSpaceOnUse">
          <rect width="48" height="32" fill="none"/>
          <rect x=".5" y=".5" width="47" height="31" fill="none" stroke="rgba(50,44,30,.16)" stroke-width=".5"/>
          <rect x="24.5" y=".5" width="23" height="31" fill="none" stroke="rgba(50,44,30,.06)" stroke-width=".5"/>
        </pattern>

        <!-- Clip paths -->
        <clipPath id="leteClip"><ellipse cx="213" cy="110" rx="50" ry="17"/></clipPath>
        <clipPath id="mnemoClip"><ellipse cx="745" cy="96" rx="72" ry="32"/></clipPath>
        <clipPath id="caronteClip"><circle cx="213" cy="415" r="74"/></clipPath>
      </defs>

      <!-- ═══════════════════════════════════
           BACKGROUND
      ═══════════════════════════════════ -->
      <rect width="960" height="590" fill="#030407"/>
      <rect width="960" height="590" fill="url(#stoneFloor)" opacity=".55"/>
      <rect width="960" height="590" fill="url(#bgCenter)"/>

      <!-- Border frame -->
      <rect x="6"  y="6"  width="948" height="578" fill="none" stroke="rgba(200,168,90,.24)" stroke-width="1"/>
      <rect x="10" y="10" width="940" height="570" fill="none" stroke="rgba(200,168,90,.10)" stroke-width="1"/>
      <!-- Corner ornaments -->
      <g fill="none" stroke="rgba(200,168,90,.38)" stroke-width="1">
        <path d="M 6,6  L 36,6  M 6,6  L 6,36"/>
        <path d="M 954,6  L 924,6  M 954,6  L 954,36"/>
        <path d="M 6,584  L 36,584  M 6,584  L 6,554"/>
        <path d="M 954,584 L 924,584 M 954,584 L 954,554"/>
      </g>
      <g fill="rgba(200,168,90,.45)">
        <polygon points="6,6 10,6 6,10"/>
        <polygon points="954,6 950,6 954,10"/>
        <polygon points="6,584 10,584 6,580"/>
        <polygon points="954,584 950,584 954,580"/>
      </g>
      <!-- Center compass rose -->
      <g transform="translate(480,295)" fill="none" stroke="rgba(200,168,90,.10)" stroke-width=".5">
        <circle cx="0" cy="0" r="220"/>
        <circle cx="0" cy="0" r="160"/>
        <line x1="-220" y1="0" x2="220" y2="0"/>
        <line x1="0" y1="-220" x2="0" y2="220"/>
        <line x1="-155" y1="-155" x2="155" y2="155"/>
        <line x1="155" y1="-155" x2="-155" y2="155"/>
      </g>

      <!-- ═══════════════════════════════════
           ATMOSPHERIC FOG
      ═══════════════════════════════════ -->
      <ellipse class="fog-a" cx="108" cy="290" rx="200" ry="90"  fill="rgba(45,70,160,.09)" filter="url(#halo)"/>
      <ellipse class="fog-b" cx="828" cy="465" rx="215" ry="98"  fill="rgba(70,32,145,.08)" filter="url(#halo)"/>
      <ellipse class="fog-c" cx="480" cy="200" rx="248" ry="68"  fill="rgba(32,52,130,.07)" filter="url(#halo)"/>
      <ellipse class="fog-d" cx="745" cy="535" rx="175" ry="75"  fill="rgba(55,22,112,.07)" filter="url(#halo)"/>
      <ellipse class="fog-a" cx="195" cy="528" rx="160" ry="68"  fill="rgba(42,22,108,.06)" filter="url(#halo)"/>
      <ellipse class="fog-b" cx="480" cy="480" rx="190" ry="80"  fill="rgba(30,12,70,.07)"  filter="url(#halo)"/>

      <!-- ═══════════════════════════════════
           CORRIDORS + ACHERONTE (from JS)
      ═══════════════════════════════════ -->
      <g id="corridors"></g>
      <g id="acheronte"></g>

      <!-- ═══════════════════════════════════
           FONTE DI LETE  (cx=213, cy=88)
      ═══════════════════════════════════ -->
      <g data-node="fonte">
        <!-- Ambient halo -->
        <ellipse class="gp" cx="213" cy="94" rx="90" ry="72" fill="rgba(45,105,255,.07)" filter="url(#halo)"/>

        <!-- Cypress LEFT -->
        <g opacity=".90">
          <path d="M 148,128 C 148,128 152,96 155,78 C 156.5,66 158,50 159,36 C 160,50 161.5,66 163,78 C 166,96 170,128 170,128 Z" fill="#0e2812"/>
          <path d="M 150,128 C 150,128 153,100 156,84 C 157,74 158,62 159,50 C 160,62 161,74 162,84 C 164,100 166,128 166,128 Z" fill="#142e18" opacity=".7"/>
          <ellipse cx="159" cy="128" rx="12" ry="4" fill="rgba(0,0,0,.35)"/>
        </g>
        <!-- Cypress RIGHT -->
        <g opacity=".88">
          <path d="M 258,128 C 258,128 262,96 265,78 C 266.5,66 268,50 269,36 C 270,50 271.5,66 273,78 C 276,96 280,128 280,128 Z" fill="#0e2812"/>
          <path d="M 260,128 C 260,128 263,100 266,84 C 267,74 268,62 269,50 C 270,62 271,74 272,84 C 274,100 276,128 276,128 Z" fill="#142e18" opacity=".7"/>
          <ellipse cx="269" cy="128" rx="12" ry="4" fill="rgba(0,0,0,.35)"/>
        </g>

        <!-- Stone basin outer shell -->
        <ellipse cx="213" cy="116" rx="60" ry="21" fill="url(#leteStone)" stroke="rgba(65,95,155,.50)" stroke-width="1.5"/>
        <ellipse cx="213" cy="114" rx="60" ry="20" fill="none" stroke="rgba(95,135,210,.18)" stroke-width=".8"/>
        <!-- Water fill -->
        <ellipse cx="213" cy="112" rx="50" ry="15" fill="url(#leteFill)" clip-path="url(#leteClip)"/>
        <ellipse cx="213" cy="112" rx="50" ry="15" fill="rgba(100,175,255,.10)"/>
        <!-- Animated water ripples (SVG SMIL) -->
        <circle cx="213" cy="112" fill="none" stroke="rgba(120,195,255,.68)" stroke-width="1.2">
          <animate attributeName="r" from="5"  to="48" dur="4s"          repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" from=".68" to="0" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="213" cy="112" fill="none" stroke="rgba(100,175,250,.55)" stroke-width="1.0">
          <animate attributeName="r" from="5"  to="48" dur="4s" begin="1.33s" repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" from=".55" to="0" dur="4s" begin="1.33s" repeatCount="indefinite"/>
        </circle>
        <circle cx="213" cy="112" fill="none" stroke="rgba(80,155,240,.42)" stroke-width="0.8">
          <animate attributeName="r" from="5"  to="48" dur="4s" begin="2.66s" repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" from=".42" to="0" dur="4s" begin="2.66s" repeatCount="indefinite"/>
        </circle>

        <!-- Stone column shaft -->
        <rect x="208" y="50" width="10" height="62" rx="2" fill="url(#leteStone)" stroke="rgba(75,108,165,.38)" stroke-width=".8"/>
        <line x1="211" y1="52" x2="211" y2="110" stroke="rgba(100,140,210,.12)" stroke-width=".5"/>
        <line x1="215" y1="52" x2="215" y2="110" stroke="rgba(100,140,210,.12)" stroke-width=".5"/>
        <!-- Column capital -->
        <rect x="203" y="46" width="20" height="6" rx="1" fill="#233040" stroke="rgba(85,118,185,.40)" stroke-width=".8"/>
        <!-- Column base -->
        <rect x="205" y="112" width="16" height="4" rx="1" fill="#1e2c3c" stroke="rgba(75,108,165,.32)" stroke-width=".8"/>

        <!-- Water-vessel / spout top -->
        <ellipse cx="213" cy="46" rx="7" ry="5" fill="rgba(75,130,225,.32)" stroke="rgba(115,182,255,.58)" stroke-width="1"/>
        <!-- Water stream -->
        <line x1="213" y1="51" x2="213" y2="77" stroke="rgba(115,188,255,.52)" stroke-width="1.5" stroke-dasharray="2 5"/>
        <!-- Glow -->
        <ellipse class="gp2" cx="213" cy="112" rx="58" ry="22" fill="rgba(65,135,255,.06)" filter="url(#haloSm)"/>

        <!-- Active ring -->
        <circle class="active-ring" cx="213" cy="88" r="78" fill="none" stroke-width="1.5" stroke-dasharray="5 4"/>
      </g>

      <!-- ═══════════════════════════════════
           LAGO DI MNEMOSYNE  (cx=745, cy=88)
      ═══════════════════════════════════ -->
      <g data-node="mnemosyne">
        <!-- Ambient halo -->
        <ellipse class="gp3" cx="745" cy="92" rx="105" ry="78" fill="rgba(210,170,45,.07)" filter="url(#halo)"/>

        <!-- Stone shore / bank -->
        <ellipse cx="745" cy="100" rx="82" ry="40" fill="url(#mnemoShore)" stroke="rgba(185,150,50,.35)" stroke-width="1.2"/>
        <ellipse cx="745" cy="98"  rx="82" ry="39" fill="none" stroke="rgba(215,180,65,.15)" stroke-width=".8"/>

        <!-- Lake water body -->
        <ellipse cx="745" cy="96" rx="70" ry="32" fill="url(#mnemoFill)" clip-path="url(#mnemoClip)"/>
        <ellipse cx="745" cy="96" rx="70" ry="32" fill="rgba(240,210,80,.09)"/>

        <!-- Shimmer surface overlays -->
        <ellipse class="gs"  cx="745" cy="90" rx="40" ry="12" fill="rgba(255,240,120,.15)"/>
        <ellipse class="gs2" cx="750" cy="98" rx="28" ry="8"  fill="rgba(255,230,100,.12)"/>

        <!-- Animated ripples (ellipse SMIL) -->
        <ellipse cx="745" cy="96" fill="none" stroke="rgba(230,200,65,.65)" stroke-width="1.2">
          <animate attributeName="rx" from="8"  to="70" dur="5s"          repeatCount="indefinite"/>
          <animate attributeName="ry" from="3"  to="30" dur="5s"          repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" from=".65" to="0" dur="5s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="745" cy="96" fill="none" stroke="rgba(215,185,55,.52)" stroke-width="1.0">
          <animate attributeName="rx" from="8"  to="70" dur="5s" begin="1.67s" repeatCount="indefinite"/>
          <animate attributeName="ry" from="3"  to="30" dur="5s" begin="1.67s" repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" from=".52" to="0" dur="5s" begin="1.67s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="745" cy="96" fill="none" stroke="rgba(200,168,45,.40)" stroke-width="0.8">
          <animate attributeName="rx" from="8"  to="70" dur="5s" begin="3.33s" repeatCount="indefinite"/>
          <animate attributeName="ry" from="3"  to="30" dur="5s" begin="3.33s" repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" from=".40" to="0" dur="5s" begin="3.33s" repeatCount="indefinite"/>
        </ellipse>

        <!-- Star reflections -->
        <g fill="rgba(255,240,160,.55)">
          <circle cx="728" cy="90" r="1.2"><animate attributeName="opacity" values=".2;.8;.2" dur="2.1s" repeatCount="indefinite"/></circle>
          <circle cx="755" cy="86" r="1.0"><animate attributeName="opacity" values=".3;.9;.3" dur="1.7s" repeatCount="indefinite"/></circle>
          <circle cx="762" cy="99" r="1.4"><animate attributeName="opacity" values=".15;.7;.15" dur="2.8s" repeatCount="indefinite"/></circle>
          <circle cx="736" cy="102" r="0.9"><animate attributeName="opacity" values=".25;.75;.25" dur="2.3s" repeatCount="indefinite"/></circle>
          <circle cx="745" cy="93" r="1.5"><animate attributeName="opacity" values=".1;.6;.1" dur="3.2s" repeatCount="indefinite"/></circle>
        </g>

        <!-- Glow -->
        <ellipse class="gp" cx="745" cy="96" rx="80" ry="38" fill="rgba(200,168,55,.06)" filter="url(#haloSm)"/>

        <!-- Active ring -->
        <ellipse class="active-ring" cx="745" cy="96" rx="88" ry="44" fill="none" stroke-width="1.5" stroke-dasharray="5 4"/>
      </g>

      <!-- ═══════════════════════════════════
           PRIMO VARCO – STONE ARCH  (cx=480, cy=255)
      ═══════════════════════════════════ -->
      <g data-node="gate1">
        <!-- Outer glow halo -->
        <circle cx="480" cy="255" r="80" fill="rgba(180,130,55,.08)" filter="url(#halo)"/>
        <!-- Stone fill circle (base) -->
        <circle cx="480" cy="255" r="68" fill="url(#gateFill)"/>
        <!-- Outer ring (JS-controlled) -->
        <circle class="outer-ring" cx="480" cy="255" r="68" fill="none" stroke-width="1.5"/>

        <!-- Entablature (horizontal beam spanning top) -->
        <rect x="418" y="196" width="124" height="10" rx="1" fill="#221a04" stroke="rgba(175,140,60,.32)" stroke-width=".6"/>
        <!-- Frieze decorative band -->
        <rect x="421" y="206" width="118" height="5" fill="#1a1400" stroke="rgba(155,122,50,.22)" stroke-width=".5"/>
        <!-- Triglyph hints on frieze -->
        <g fill="none" stroke="rgba(155,122,45,.18)" stroke-width=".5">
          <line x1="440" y1="207" x2="440" y2="210"/> <line x1="443" y1="207" x2="443" y2="210"/>

    <script>
      const NODES = {
        fonte:    { x:213, y:88,  label:"FONTE DI LETE",     desc:"Chi beve le acque del Lete dimentica ogni vita passata. La morte dell'identità." },
        mnemosyne:{ x:745, y:88,  label:"LAGO DI MNEMOSYNE", desc:"Chi beve dal lago della Memoria conserva la coscienza nell'aldilà. La via degli iniziati." },
        gate1:    { x:480, y:255, label:"SECONDO VARCO",       desc:"Il passaggio si stringe. Senti il peso dell'Ade su ogni pietra." },
        caronte:  { x:213, y:415, label:"CARONTE",            desc:"Il traghettatore dei morti. Se ti fermi qui, non tornerai. Hai la moneta?" },
        gate2:    { x:480, y:415, label:"PRIMO VARCO",        desc:"Una porta sbarrata nel cuore del labirinto. Due vie si aprono qui." },
        porta:    { x:480, y:533, label:"PORTA DI ORFEO",     desc:"La via dell'uscita. Solo chi ha seguito la via corretta può varcare questa soglia." },
      };

      /* ── Corridors ── */
      const JTL={x:213,y:168}, JTC={x:480,y:168}, JTR={x:745,y:168};
      const JAL={x:213,y:335}, JAR={x:480,y:335};
      const N = NODES;

      const corridorPaths = [
        `M ${N.fonte.x} ${N.fonte.y+52} L ${JTL.x} ${JTL.y}`,
        `M ${JTL.x} ${JTL.y} L ${JTC.x} ${JTC.y}`,
        `M ${JTC.x} ${JTC.y} L ${JTR.x} ${JTR.y}`,
        `M ${JTR.x} ${JTR.y} L ${N.mnemosyne.x} ${N.mnemosyne.y+10}`,
        `M ${JTC.x} ${JTC.y} L ${N.gate1.x} ${N.gate1.y-68}`,
        `M ${N.gate1.x} ${N.gate1.y+68} L ${JAR.x} ${JAR.y}`,
        `M ${N.gate2.x-68} ${N.gate2.y} L ${N.caronte.x+78} ${N.caronte.y}`,
        `M ${JAR.x} ${JAR.y} L ${N.gate2.x} ${N.gate2.y-68}`,
        `M ${N.gate2.x} ${N.gate2.y+68} L ${N.porta.x} ${N.porta.y-44}`,
      ];

      const ns = "http://www.w3.org/2000/svg";
      function mkPath(d, stroke, width, blur) {
        const p = document.createElementNS(ns, "path");
        p.setAttribute("d", d);
        p.setAttribute("fill", "none");
        p.setAttribute("stroke", stroke);
        p.setAttribute("stroke-width", width);
        if (blur) p.style.filter = `blur(${blur}px)`;
        return p;
      }

      const corridorsEl = document.getElementById("corridors");
      corridorPaths.forEach(d => {
        const g = document.createElementNS(ns, "g");
        /* Wide stone-wall glow */
        g.append(mkPath(d, "rgba(140,110,45,.22)", 22, 8));
        /* Stone surface */
        g.append(mkPath(d, "rgba(60,48,18,.85)", 10));
        /* Path edge lines */
        g.append(mkPath(d, "rgba(200,168,85,.28)", 6));
        /* Centre walkway */
        g.append(mkPath(d, "rgba(220,190,100,.18)", 2));
        /* Subtle bright centreline */
        g.append(mkPath(d, "rgba(240,215,130,.12)", 1));
        corridorsEl.appendChild(g);
      });

      /* ── Acheronte river ── */
      (function () {
        const pts = [];
        for (let i = 0; i <= 30; i++) {
          const t  = i / 30;
          const px = JAL.x + t * (JAR.x - JAL.x);
          const py = 210
            + Math.sin(t * Math.PI * 6)  * 6
            + Math.cos(t * Math.PI * 4)  * 3.5
            + Math.sin(t * Math.PI * 11) * 1.8;
          pts.push(`${i === 0 ? "M" : "L"} ${px.toFixed(1)} ${py.toFixed(1)}`);
        }
        const d = pts.join(" ");
        const g = document.getElementById("acheronte");

        /* Deep glow */
        g.append(mkPath(d, "rgba(30,65,200,.18)", 22, 10));
        /* Dark water body */
        g.append(mkPath(d, "rgba(18,40,140,.65)", 10));
        /* Mid shimmer */
        g.append(mkPath(d, "rgba(50,110,230,.40)", 5));
        /* Surface highlight */
        const edge = mkPath(d, "rgba(90,165,255,.65)", 2);
        edge.setAttribute("stroke-linecap", "round");
        g.append(edge);
        /* White crest sparkle */
        g.append(mkPath(d, "rgba(200,230,255,.22)", 1));

        /* River label */
        const txt = document.createElementNS(ns, "text");
        Object.entries({
          x: (JAL.x + JAR.x) / 2, y: 194,
          "text-anchor": "middle",
          fill: "rgba(110,168,255,.72)",
          "font-size": 9, "letter-spacing": 4,
          "font-family": "Cinzel, serif",
        }).forEach(([k,v]) => txt.setAttribute(k, v));
        txt.textContent = "ACHERONTE";
        g.appendChild(txt);
      })();

      /* ── Selection & Tooltip ── */
      let selected = null;
      const tooltip      = document.getElementById("tooltip");
      const tooltipTitle = document.getElementById("tooltip-title");
      const tooltipDesc  = document.getElementById("tooltip-desc");

      function select(id) {
        document.querySelectorAll("[data-node]").forEach(el => el.classList.remove("active"));
        if (id && id !== selected) {
          document.querySelector(`[data-node="${id}"]`).classList.add("active");
          selected = id;
          const n = NODES[id];
          tooltipTitle.textContent = n.label;
          tooltipDesc.textContent  = n.desc;
          tooltip.setAttribute("transform", `translate(${n.x},${n.y - 95})`);
          tooltip.removeAttribute("display");
        } else {
          selected = null;
          tooltip.setAttribute("display", "none");
        }
      }

      document.querySelectorAll("[data-node]")
        .forEach(el => el.addEventListener("click", () => select(el.dataset.node)));
      document.getElementById("tooltip-close")
        .addEventListener("click", e => { e.stopPropagation(); select(null); });
    </script>
  </body>
</html>
